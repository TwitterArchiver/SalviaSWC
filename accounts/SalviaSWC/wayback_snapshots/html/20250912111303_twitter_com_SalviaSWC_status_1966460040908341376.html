  关于使用解离剂(尤其是策划药!)的警告⚠️
  <br/>
  所有解离剂都可以导致大脑空泡化。但是不同解离剂的毒性不同，长期大量滥用右美会导致可逆的大脑空泡化，某些解离剂(如MK-801)只需一次使用便可导致永久病变
  <br/>
